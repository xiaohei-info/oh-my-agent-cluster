name: Bug report
description: Report a reproducible defect in oh-my-multica.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve oh-my-multica. Remove secrets, personal data, private code, machine paths, workspace IDs, and Agent IDs before submitting.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `omac --version`.
      placeholder: omac 1.0.0
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Engine
      options:
        - multica
        - mock
        - not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Provide sanitized commands, inputs, and repository conditions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Verification evidence
      description: Include exit code, sanitized output, Python version, OS, and relevant checks.
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: Where did this block you?
      options:
        - installation
        - initialization
        - planning
        - DAG execution
        - review or CI
        - merge or final acceptance
        - web dashboard
        - other
    validations:
      required: true
